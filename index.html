<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional Layout</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="top-bar">
      <div class="top-inner">
        <img class="top-bar-logo" src="Images/logo.svg" alt="Site logo" width="100" height="100" />


        <div class="top-controls">
          <nav class="page-nav" aria-label="Page navigation">
            <a href="index.html" class="page-btn">Page 1</a>
            <a href="page2.html" class="page-btn">Page 2</a>
            <a href="page3.html" class="page-btn">Page 3</a>
            <a href="page4.html" class="page-btn">Page 4</a>
            <a href="page5.html" class="page-btn">Page 5</a>
          </nav>

          <div class="search-wrap">
            <label class="sr-only" for="site-search">Search Website</label>
            <input id="site-search" type="search" placeholder="Search Website" autocomplete="off" />
            <ul id="search-results" class="search-results" hidden></ul>
          </div>
        </div>
      </div>
    </div>

    <nav class="accent-bar" aria-label="Section navigation">
      <div class="accent-inner">
        <a href="#" class="nav-btn">Section 1</a>
        <a href="#" class="nav-btn">Section 2</a>
        <a href="#" class="nav-btn">Section 3</a>
        <a href="#" class="nav-btn">Section 4</a>
      </div>
    </nav>
  </header>

  <section class="games-hero" aria-label="Introduction banner">
    <div class="games-hero-inner">
      <div class="games-image-placeholder">
        <div class="hero-video-row" aria-hidden="true">
          <video class="hero-strip-video js-strip-video" muted loop playsinline preload="metadata"><source src="Video/testvideo.webm" type="video/webm" /></video>
          <video class="hero-strip-video js-strip-video" muted loop playsinline preload="metadata"><source src="Video/testvideo.webm" type="video/webm" /></video>
          <video class="hero-strip-video js-strip-video" muted loop playsinline preload="metadata"><source src="Video/testvideo.webm" type="video/webm" /></video>
          <video class="hero-strip-video js-strip-video" muted loop playsinline preload="metadata"><source src="Video/testvideo.webm" type="video/webm" /></video>
          <video class="hero-strip-video js-strip-video" muted loop playsinline preload="metadata"><source src="Video/testvideo.webm" type="video/webm" /></video>
          <video class="hero-strip-video js-strip-video" muted loop playsinline preload="metadata"><source src="Video/testvideo.webm" type="video/webm" /></video>
          <video class="hero-strip-video js-strip-video" muted loop playsinline preload="metadata"><source src="Video/testvideo.webm" type="video/webm" /></video>
        </div>
        <div class="hero-strip-row" aria-hidden="true">
          <img class="hero-strip-image js-hero-image" src="Images/Games/img1.jpg" alt="" />
          <img class="hero-strip-image js-hero-image" src="Images/Games/img2.jpg" alt="" />
          <img class="hero-strip-image js-hero-image" src="Images/Games/img3.jpg" alt="" />
          <img class="hero-strip-image js-hero-image" src="Images/Games/img4.jpg" alt="" />
          <img class="hero-strip-image js-hero-image" src="Images/Games/img5.jpg" alt="" />
          <img class="hero-strip-image js-hero-image" src="Images/Games/img6.jpg" alt="" />
          <img class="hero-strip-image js-hero-image" src="Images/Games/img7.jpg" alt="" />
        </div>
        <div class="hero-strip-darken" aria-hidden="true"></div>

        <div class="hero-center-content">
          <p class="hero-kicker">WELCOME TO MY WEBSITE</p>
          <h1 class="games-overlay">REALDAN</h1>
          <p class="games-subtitle">Games, systems, and interactive experiences.</p>
          <p class="games-subtitle games-subtitle-second">Built with creativity and code.</p>

          <div class="hero-actions">
            <a class="hero-btn hero-btn-primary" href="#page-content">Explore Projects <span aria-hidden="true">→</span></a>
            <button class="hero-btn hero-btn-secondary js-open-reel" type="button">▶ Watch Reel</button>
          </div>

          <div class="hero-scroll">
            <span>Scroll to explore</span>
            <span aria-hidden="true">↓</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <main class="content" id="page-content"></main>

  <div class="reel-modal" id="reel-modal" hidden>
    <div class="reel-modal-dialog" role="dialog" aria-modal="true" aria-label="Watch reel video">
      <button class="reel-close js-close-reel" type="button" aria-label="Close reel">✕</button>
      <video class="reel-video" controls playsinline preload="metadata">
        <source src="Video/testvideo.webm" type="video/webm" />
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <img class="site-footer-logo" src="Images/logo.svg" alt="Site logo" width="130" height="130" />
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
